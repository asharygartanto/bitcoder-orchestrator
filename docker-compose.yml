services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: bitcoder-chromadb
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
      - ALLOW_RESET=TRUE

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bitcoder-backend
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    depends_on:
      chromadb:
        condition: service_started
      rag-engine:
        condition: service_started
    volumes:
      - upload_data:/app/uploads

  rag-engine:
    build:
      context: ./rag-engine
      dockerfile: Dockerfile
    container_name: bitcoder-rag-engine
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_TELEMETRY_DISABLED=TRUE
    depends_on:
      chromadb:
        condition: service_started
    volumes:
      - upload_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: bitcoder-frontend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend
      - rag-engine
    networks:
      - bitcoder-network

  test-api:
    build:
      context: ./rag-engine/test_api
      dockerfile: Dockerfile
    container_name: bitcoder-test-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8090"
    networks:
      - bitcoder-network

volumes:
  chroma_data:
  upload_data:

networks:
  bitcoder-network:
    driver: bridge
